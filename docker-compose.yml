services:
  agent:
    image: tldevde/dockinv-agent:latest
    restart: always
    ports:
      - "9999:9999"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      HTTP_TOKEN: your_secret

  server:
    image: tldevde/dockinv-server:latest
    restart: always
    ports:
     - "8000:8000"
    depends_on:
      - redis
    environment:
      - DATABASE_AUTO_UPGRADE=1
    volumes:
        - data:/data

  worker:
    image: tldevde/dockinv-server:latest
    command: celery -A tasks worker -l info -B -s /data/celerybeat-schedule
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "celery -A tasks inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - redis
    volumes:
        - data:/data
        - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

  redis:
    image: redis:7-alpine
    restart: always


volumes:
  data: