{%  extends 'base.html.j2' %}

{% block page %}Add host{% endblock %}

{% block body %}
<form class="form-control max-w-96" method="post" action="/hosts/save">
    <div class="mb-4">
        <label for="name" class="label">
            Name
        </label>
        <input type="text" maxlength="255" placeholder="Alias" class="input input-bordered w-full" id="name" name="name" required/>
    </div>
    <div class="mb-4">
        <label for="address" class="label">
            Address
        </label>
        <input type="text" maxlength="79" placeholder="Url" class="input input-bordered w-full" id="address" name="address" required/>
    </div>
    <div class="mb-4">
        <label for="token" class="label">
            Token (optional)
        </label>
        <input type="text" maxlength="32" placeholder="Secret" class="input input-bordered w-full " id="token" name="token"/>
    </div>
    <div class="mb-4 flex items-center">
        <label for="enabled" class="label">
            Active
        </label>
        <input type="checkbox" class="checkbox ml-auto mr-4"  name="enabled" id="enabled" checked="checked"/>
    </div>
    <div class="mb-4">
        <button type="submit" class="btn btn-sm btn-primary max-w-md mx-auto my-4">Add</button>
    </div>
</form>
{% endblock %}
